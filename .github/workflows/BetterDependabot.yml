name: BetterDependabot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - uses: pnpm/action-setup@v6

      - name: Update dependencies in root
        working-directory: .
        # Exclude typescript from the unconstrained "--latest" sweep: this repo's
        # tsconfig.json relies on the "node" moduleResolution mode that TypeScript 7
        # removed (TS5108), so `--latest` (which ignores the package.json range)
        # previously bumped typescript straight to the incompatible v7 major and
        # broke `build:server`. Keep typescript pinned to 6.0.3; bump deliberately.
        run: pnpm update --latest '!typescript'

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(deps): pnpm update [root]' || echo "No changes"

      - uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
